{% extends 'tasks/base.html' %}

{% block content %}

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 max-w-xl mx-auto">

    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ action }} Tarefa</h1>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
            <input type="text" name="title" value="{{ form.title.value|default:'' }}"
                   class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Ex: Estudar Django">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
            <textarea name="description" rows="3"
                      class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Detalhes opcionais...">{{ form.description.value|default:'' }}</textarea>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Prioridade</label>
            <select name="priority"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% for value, label in form.fields.priority.choices %}
                    <option value="{{ value }}"
                        {% if form.priority.value == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                {{ action }}
            </button>
            <a href="{% url 'task_list' %}"
               class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2 transition">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
